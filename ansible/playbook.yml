---
- name: Deploy DevOps Task Tracker
  hosts: web
  become: true

  vars:
    app_dir: /opt/devops-task-tracker
    image_tag: latest
    ghcr_owner: "your-user/tpdevopsm1"
    ghcr_user: ""
    ghcr_token: ""

  tasks:
    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
        state: present
        update_cache: true

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine + Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: true

    - name: Configure UFW firewall rules
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "8080"
        - "3001"
        - "9090"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy production compose file
      copy:
        src: files/docker-compose.prod.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copy monitoring config
      copy:
        src: "{{ playbook_dir }}/../monitoring/"
        dest: "{{ app_dir }}/monitoring/"
        mode: "0644"

    - name: Log in to GHCR
      when: ghcr_token | length > 0
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_user }}"
        password: "{{ ghcr_token }}"

    - name: Pull and start the stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
        state: present
      environment:
        GHCR_OWNER: "{{ ghcr_owner }}"
        IMAGE_TAG: "{{ image_tag }}"
